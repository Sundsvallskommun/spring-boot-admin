logbook:
  excluded:
    paths: /**
openapi:
  enabled: false
server:
  forward-headers-strategy: framework
spring:
  application:
    name: spring-boot-admin
  boot:
    admin:
      client:
        # Prevent spring boot admin client from registering itself
        enabled: false
      ui:
        title: ${config.ui.title}
        brand: ${config.ui.brand}
        remember-me-enabled: false
      monitor:
        # Time interval to check the status of instances (in ms).
        status-interval: 30000
        # Lifetime of status. The status won't be updated as long the last status isn't expired (in ms).
        status-lifetime: 30000
      discovery:
        # When a service vanishes from K8s discovery, deregister it from SBA.
        # Combined with K8s being the source of truth, this fixes the "stale instance" problem
        # where SBA kept polling pods that had been deleted from the cluster.
        remove-services-without-instance: true
        # Exclude SBA from monitoring itself — if SBA is down, it can't display its own health anyway,
        # and self-discovery causes version conflicts during rolling restarts in OpenShift.
        ignored-services:
          - spring-boot-admin
      notify:
        # Slack integration
        slack:
          enabled: ${config.slack.enabled}
          webhook-url: ${config.slack.webhook-url}
          title: 'Microservice alerts'
          message: '*#{name}* (#{id}) is *#{status}*'
  security:
    # Enable or disble security (e.g. authentication). Default if missing: true
    enabled: false
    user:
      name: ${config.security.name}
      password: ${config.security.password}
  cloud:
    kubernetes:
      discovery:
        all-namespaces: true
        service-labels:
          spring-boot: true
  hazelcast:
    kubernetes:
      # Headless K8s service that fronts the SBA pods. When unset, Hazelcast runs as a single-member cluster
      # (used in local dev / tests). In Kubernetes deployments, point this at the SBA service.
      service-name: ${config.hazelcast.kubernetes.service-name:}
      namespace: ${config.hazelcast.kubernetes.namespace:}
logging:
  level:
    # Debug logging for notifiers to diagnose Slack integration
    de.codecentric.boot.admin.server.notify: DEBUG
